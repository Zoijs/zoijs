name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Fast feedback: every package's unit/DOM tests + TypeScript checks, on a
  # small Node matrix. Uses the root scripts (npm --prefix under the hood).
  unit:
    name: Unit + Types (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Node 18 is EOL (2025-04) and modern jsdom needs require(ESM), which
        # only exists in Node 20.19+/22.12+ — so we test 20, 22, and current 24.
        node: [20, 22, 24]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
          cache-dependency-path: "**/package-lock.json"
      - run: npm run install:all
      - run: npm test
      - run: npm run test:types

  # Real browsers are slower, so they run once (Node 20) in a separate job.
  browser:
    name: Browser (Chromium / Firefox / WebKit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: "**/package-lock.json"
      - run: npm run install:all
      # Use the Playwright already installed in a package to fetch the browsers.
      - name: Install Playwright browsers
        working-directory: framework
        run: npx playwright install --with-deps chromium firefox webkit
      - run: npm run test:browser

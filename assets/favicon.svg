<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="Zoijs">
  <title>Zoijs</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0e2a4d"/>
      <stop offset="1" stop-color="#081226"/>
    </linearGradient>
    <linearGradient id="zblue" x1="20" y1="18" x2="44" y2="46" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#5cc8ff"/>
      <stop offset="1" stop-color="#2f8fe6"/>
    </linearGradient>
  </defs>
  <circle cx="32" cy="32" r="32" fill="url(#bg)"/>
  <!-- broken orange accent ring -->
  <circle cx="32" cy="32" r="26" fill="none" stroke="#f59e0b" stroke-width="3"
          stroke-linecap="round" stroke-dasharray="30 11.3" transform="rotate(-58 32 32)"/>
  <!-- Z bar -->
  <polygon fill="url(#zblue)" points="21,18 43,18 43,24 32,40 43,40 43,46 21,46 21,40 32,24 21,24"/>
  <!-- constellation nodes -->
  <g fill="#dff1ff">
    <circle cx="21" cy="18" r="2.4"/>
    <circle cx="43" cy="18" r="2.4"/>
    <circle cx="32" cy="32" r="2.4"/>
    <circle cx="21" cy="46" r="2.4"/>
    <circle cx="43" cy="46" r="2.4"/>
  </g>
</svg>

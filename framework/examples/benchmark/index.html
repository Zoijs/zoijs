<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zoijs — Benchmark</title>
    <style>
      body { font-family: system-ui, sans-serif; margin: 0; padding: 2rem; background: #f5f5f7; color: #1d1d1f; }
      .bench { max-width: 640px; margin: 0 auto; }
      h1 { font-size: 1.25rem; }
      .row { display: flex; flex-wrap: wrap; gap: .5rem; margin-bottom: 1rem; }
      button { font-size: .95rem; padding: .5rem .9rem; border: none; border-radius: 8px; background: #0071e3; color: #fff; cursor: pointer; }
      #result { background: #fff; padding: .75rem 1rem; border-radius: 8px; min-height: 1.2rem; font-size: .9rem; }
      .list { columns: 3; font-size: .8rem; list-style: none; padding: 0; margin: 1rem 0 0; }
    </style>
  </head>

    <div id="app"></div>
    <script type="module" src="./app.js"></script>

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zoijs — Todo</title>
    <style>
      body { font-family: system-ui, sans-serif; display: grid; place-items: center; min-height: 100vh; margin: 0; background: #f5f5f7; color: #1d1d1f; }
      .todo { background: #fff; padding: 2rem; border-radius: 12px; box-shadow: 0 1px 3px rgba(0,0,0,.1); min-width: 360px; }
      h1 { font-size: 1.25rem; margin: 0 0 1rem; }
      .row { display: flex; gap: .5rem; margin-bottom: 1rem; }
      input[type="text"], .row input { flex: 1; font-size: 1rem; padding: .5rem; border: 1px solid #ccc; border-radius: 8px; }
      button { font-size: 1rem; padding: .5rem 1rem; border: none; border-radius: 8px; background: #0071e3; color: #fff; cursor: pointer; }
      ul { list-style: none; padding: 0; margin: 0; }
      li { display: flex; align-items: center; gap: .5rem; padding: .4rem 0; border-bottom: 1px solid #eee; }
      li span { flex: 1; }
      li.done span { text-decoration: line-through; color: #999; }
      .del { background: #eee; color: #333; padding: .2rem .5rem; }
      .count { color: #666; font-size: .9rem; }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="./app.js"></script>
  </body>
</html>

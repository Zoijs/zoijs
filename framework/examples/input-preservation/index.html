<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zoijs — Input Preservation</title>
    <style>
      body { font-family: system-ui, sans-serif; display: grid; place-items: center; min-height: 100vh; margin: 0; background: #f5f5f7; color: #1d1d1f; }
      .demo { background: #fff; padding: 2rem; border-radius: 12px; box-shadow: 0 1px 3px rgba(0,0,0,.1); min-width: 360px; }
      h1 { font-size: 1.2rem; margin: 0 0 1rem; }
      .row { display: flex; gap: .5rem; margin-bottom: 1rem; }
      button { font-size: .95rem; padding: .5rem .9rem; border: none; border-radius: 8px; background: #0071e3; color: #fff; cursor: pointer; }
      ul { list-style: none; padding: 0; margin: 0; }
      li { display: flex; align-items: center; gap: .5rem; padding: .35rem 0; }
      li label { width: 4rem; color: #555; }
      li input { flex: 1; padding: .4rem; border: 1px solid #ccc; border-radius: 6px; }
      p { color: #666; font-size: .85rem; }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="./app.js"></script>
  </body>
</html>
